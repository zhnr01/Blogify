services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blogify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogify}
      POSTGRES_DB: ${POSTGRES_DB:-blogify}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blogify}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      target: runtime
    command: ["web"]
    environment:
      FLASK_CONFIG: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-blogify}:${POSTGRES_PASSWORD:-blogify}@db:5432/${POSTGRES_DB:-blogify}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RATELIMIT_STORAGE_URI: redis://redis:6379/3
      CACHE_TYPE: RedisCache
      BLOGIFY_ADMIN: ${BLOGIFY_ADMIN:-}
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: runtime
    command: ["worker"]
    environment:
      FLASK_CONFIG: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-blogify}:${POSTGRES_PASSWORD:-blogify}@db:5432/${POSTGRES_DB:-blogify}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CACHE_TYPE: RedisCache
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
